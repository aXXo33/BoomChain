<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-wihdth,initial-scale=1.0,user-scalable=no">
<title>Boom Chain</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;overflow:hidden;font-family:'Segoe UI',sans-serif;touch-action:none;user-select:none}
canvas{display:block}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:rgba(5,5,20,0.95)}
.overlay.active{display:flex!important}
.title{font-size:2.8em;font-weight:900;background:linear-gradient(135deg,#ff6b35,#f7c948,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 40px rgba(255,107,53,0.3);margin-bottom:10px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}tho{transform:translateY(0);opacity:1}}
@keyframes popIn{0%{transform:scale(0);opacity:0}50%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes glow{0%,100%{box-shadow:0 0 10px rgba(255,107,53,0.5)}50%{box-shadow:0 0 30px rgba(255,107,53,0.8)}}
@keyframes floatUp{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-80px) scale(1.5)f;opacity:0}}
.subtitle{color:#aaa;font-size:1em;margin-bottom:25px;letter-spacing:2px}
.btn{padding:14px 40px;font-size:1.15em;font-weight:700;border:none;border-radius:12px;cursor:pointer;margin:6px;transition:all 0.2s;letter-spacing:1px}
.btn-primary{background:linear-gradient(135deg,#ff6b35,#e8552a);color:#fff;box-shadow:0 4px 15px rgba(255,107,53,0.4)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,107,53,0.6)}
.btn-secondary{background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2)}
.btn-secondary:hover{background:rgba(255,255,255,0.2)}
.btn-gold{background:linear-gradient(135deg,#f7c948,#f2a900);color:#1a1a2e;box-shadow:0 4px 15px rgba(247,201,72,0.4)}
.btn-small{padding:8px 20px;font-size:0.9em}
.hud{position:fixed;top:0;left:0;width:100%;padding:10px 15px;display:flex;justify-content:space-between;align-items:center;z-index:50;background:linear-gradient(180deg,rgba(5,5,20,0.9),transparent);pointer-events:none}
.hud-item{color:#fff;font-size:0.85em;font-weight:600;pointer-events:auto}
.hud-room{color:#888;font-size:0.7em}
.hud-coin{color:#f7c948;font-size:0.9em;font-weight:700}
.stars{color:#f7c948;font-size:1.3em;letter-spacing:3px;margin:8px 0}
.room-card{background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px;margin:8px;text-align:center;cursor:pointer;transition:all 0.3s;width:140px;position:relative}
.room-card:hover{transform:translateY(-3px);border-color:rgba(255,107,53,0.5)}
.room-card.locked{opacity:0.4;cursor:default}
.room-card.locked:hover{transform:none}
.room-card .room-icon{font-size:2em;margin-bottom:5px}
.room-card .room-name{color:#fff;font-size:0.85em;font-weight:700}
.room-card .room-info{color:#888;font-size:0.65em;margin-top:4px}
.room-card .room-stars{color:#f7c948;font-size:0.75em}
.room-card .lock-icon{position:absolute;top:8px;right:8px;font-size:1.2em}
.room-progress{width:100%;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;margin-top:6px}
.room-progress-fill{height:100%;border-radius:2px;transition:width 0.3s}
.level-dots{display:flex;gap:10px;margin:15px 0;justify-content:center;flex-wrap:wrap}
.level-dot{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85em;cursor:pointer;transition:all 0.2s;border:2px solid rgba(255,255,255,0.2);color:#fff}
.level-dot:hover{transform:scale(1.15)}
.level-dot.completed{background:rgba(76,175,80,0.3);border-color:#4CAF50}
.level-dot.current{animation:glow 1.5s infinite;border-color:#ff6b35}
.level-dot.locked{opacity:0.3;cursor:default}
.level-dot.boss{border-color:#ff1744;background:rgba(255,23,68,0.2)}
.fomo{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);color:#4CAF50;font-size:0.75em;z-index:50;opacity:0.7}
.combo-text{position:fixed;font-size:2.5em;font-weight:900;z-index:200;pointer-events:none;animation:floatUp 1s forwards;text-shadow:0 0 20px currentColor}
.score-fly{position:fixed;font-size:1.2em;font-weight:700;z-index:200;pointer-events:none;animation:floatUp 0.8s forwards;color:#f7c948}
#confettiCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:150;pointer-events:none}
.shop-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:10px;max-width:360px;max-height:50vh;overflow-y:auto}
.shop-item{background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.1);border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer;transition:all 0.2s}
.shop-item:hover{border-color:rgba(255,107,53,0.5);transform:scale(1.05)}
.shop-item.owned{border-color:#4CAF50}
.shop-item.equipped{border-color:#f7c948;box-shadow:0 0 15px rgba(247,201,72,0.3)}
.shop-item .skin-preview{width:40px;height:40px;border-radius:50%;margin:0 auto 6px}
.shop-item .skin-name{color:#fff;font-size:0.7em;font-weight:600}
.shop-item .skin-price{color:#f7c948;font-size:0.7em;margin-top:3px}
.achievement-list{max-width:340px;max-height:45vh;overflow-y:auto;padding:5px}
.achievement{display:flex;align-items:center;gap:10px;padding:10px;margin:5px 0;background:rgba(255,255,255,0.05);border-radius:10px;border:1px solid rgba(255,255,255,0.1)}
.achievement.unlocked{border-color:#f7c948;background:rgba(247,201,72,0.05)}
.achievement .ach-icon{font-size:1.5em;width:35px;text-align:center}
.achievement .ach-info{flex:1}
.achievement .ach-name{color:#fff;font-size:0.8em;font-weight:700}
.achievement .ach-desc{color:#888;font-size:0.65em}
.achievement .ach-status{font-size:0.7em;color:#4CAF50}
.spin-wheel{width:220px;height:220px;border-radius:50%;position:relative;margin:15px auto;border:4px solid #f7c948;transition:transform 3s cubic-bezier(0.17,0.67,0.12,0.99)}
.spin-segment{position:absolute;width:100%;height:100%;display:flex;align-items:flex-start;justify-content:center;padding-top:25px;font-size:0.8em;font-weight:700}
.spin-pointer{width:0;height:0;border-left:15px solid transparent;border-right:15px solid transparent;border-top:25px solid #ff6b35;margin:0 auto;position:relative;z-index:5}
.leaderboard-list{max-width:320px;width:100%;padding:5px}
.lb-row{display:flex;align-items:center;padding:10px 15px;margin:4px 0;border-radius:10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08)}
.lb-row.me{border-color:#ff6b35;background:rgba(255,107,53,0.1)}
.lb-rank{width:30px;font-weight:900;font-size:1.1em;color:#f7c948}
.lb-name{flex:1;color:#fff;font-size:0.85em;font-weight:600}
.lb-score{color:#aaa;font-size:0.85em;font-weight:700}
.achievement-popup{position:fixed;top:80px;right:20px;background:rgba(20,20,40,0.95);border:2px solid #f7c948;border-radius:12px;padding:12px 18px;z-index:250;animation:slideUp 0.5s;display:flex;align-items:center;gap:10px}
.achievement-popup .ap-icon{font-size:1.5em}
.achievement-popup .ap-text{color:#fff;font-size:0.8em}
.achievement-popup .ap-name{color:#f7c948;font-weight:700;font-size:0.85em}
.tab-bar{display:flex;gap:5px;margin-bottom:15px}
.tab-btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:0.8em;background:rgba(255,255,255,0.1);color:#aaa;transition:all 0.2s}
.tab-btn.active{background:linear-gradient(135deg,#ff6b35,#e8552a);color:#fff}

.impossible-warning{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:300;background:rgba(255,0,0,0.15);pointer-events:none;animation:impossiblePulse 0.5s ease-out forwards}
@keyframes impossiblePulse{0%{background:rgba(255,0,0,0.4)}100%{background:rgba(255,0,0,0)}}
.impossible-text{font-size:2.5em;font-weight:900;color:#ff1744;text-shadow:0 0 30px rgba(255,23,68,0.8),0 0 60px rgba(255,23,68,0.4);animation:impossibleShake 0.5s ease-out}
@keyframes impossibleShake{0%,100%{transform:translateX(0)}10%{transform:translateX(-10px)}20%{transform:translateX(10px)}30%{transform:translateX(-8px)}40%{transform:translateX(8px)}50%{transform:translateX(-5px)}}
.impossible-sub{color:#ff5252;font-size:0.9em;margin-top:5px;font-weight:700}
.rage-bar{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);width:200px;height:8px;background:rgba(255,255,255,0.1);border-radius:4px;z-index:55;overflow:hidden;opacity:0;transition:opacity 0.3s}
.rage-bar.visible{opacity:1}
.rage-fill{height:100%;border-radius:4px;transition:width 0.3s;background:linear-gradient(90deg,#ff9800,#ff1744)}
.rage-label{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);color:#ff5722;font-size:0.65em;font-weight:700;z-index:55;opacity:0;transition:opacity 0.3s}
.rage-label.visible{opacity:1}
.rage-mode-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:45;pointer-events:none;display:none;border:4px solid #ff1744;box-shadow:inset 0 0 60px rgba(255,23,68,0.3);animation:ragePulse 0.3s infinite alternate}
@keyframes ragePulse{0%{border-color:#ff1744;box-shadow:inset 0 0 60px rgba(255,23,68,0.3)}100%{border-color:#ff5722;box-shadow:inset 0 0 80px rgba(255,87,34,0.4)}}
.near-miss{position:fixed;font-size:1.8em;font-weight:900;color:#ff1744;z-index:200;pointer-events:none;text-shadow:0 0 20px rgba(255,23,68,0.8);animation:nearMissAnim 1.5s forwards}
@keyframes nearMissAnim{0%{transform:scale(2);opacity:0}15%{transform:scale(1);opacity:1}70%{opacity:1}100%{transform:translateY(-40px);opacity:0}}
.boss-taunt{position:fixed;top:100px;left:50%;transform:translateX(-50%);background:rgba(255,23,68,0.9);color:#fff;padding:10px 20px;border-radius:12px;font-weight:700;font-size:0.9em;z-index:200;animation:tauntAnim 2.5s forwards;pointer-events:none}
@keyframes tauntAnim{0%{transform:translateX(-50%) scale(0)}10%{transform:translateX(-50%) scale(1.1)}20%{transform:translateX(-50%) scale(1)}80%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-20px)}}
.chain-record-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,#f7c948,#ff6b35);color:#1a1a2e;padding:15px 25px;border-radius:16px;font-weight:900;font-size:1.3em;z-index:250;animation:popIn 0.5s;text-align:center;pointer-events:none}
.daily-badge{position:absolute;top:-5px;left:-5px;background:#ff1744;color:#fff;font-size:0.5em;padding:2px 6px;border-radius:8px;font-weight:700;animation:pulse 1.5s infinite}
</style>
</head>
<body>
<canvas id="confettiCanvas"></canvas>
<canvas id="gameCanvas"></canvas>
<div id="menuS" class="overlay" style="display:flex">
<div style="font-size:3.5em;margin-bottom:5px">&#x1F52C;</div>
<div class="title">BOOM CHAIN</div>
<div class="subtitle">BLAST & BOUNCE</div>
<div id="menuCoins" class="hud-coin" style="font-size:1.1em;margin-bottom:10px"></div>
<button class="btn btn-primary" onclick="startWorldMap()">&#x25B6; PLAY</button>
<button class="btn btn-gold" onclick="openDailyReward()">&#x1F3B0; DAILY SPIN</button>
  <button class="btn btn-secondary btn-small" onclick="startDailyChallenge()" style="margin-top:5px;border-color:#ff1744;color:#ff1744">&#x26A0;&#xFE0F; DAILY IMPOSSIBLE</button>
    <button class="btn btn-secondary btn-small" onclick="startWeeklyChallenge()" style="margin-top:8px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:1px solid #8b5cf6">&#x1F3C6; WEEKLY CHALLENGE</button>
<div style="display:flex;gap:5px;margin-top:5px">
<button class="btn btn-secondary btn-small" onclick="openShop()">&#x1F6D2; SHOP</button>
<button class="btn btn-secondary btn-small" onclick="openAchievements()">&#x1F3C6; BADGES</button>
<button class="btn btn-secondary btn-small" onclick="openLeaderboard()">&#x1F4CA; RANK</button>
</div>
<div style="display:flex;gap:5px;margin-top:8px"><button class="btn btn-secondary btn-small" id="musicToggle" onclick="toggleMusic()">&#x1F3B5; MUSIC: OFF</button><button class="btn btn-secondary btn-small" onclick="showStats()">&#x1F4C8; STATS</button></div>
<div id="streakInfo" style="color:#ff6b35;font-size:0.8em;margin-top:10px"></div>
<div id="dailyInfo" style="color:#4CAF50;font-size:0.75em;margin-top:5px"></div>
</div>

<div id="tutorialS" class="overlay">
<div style="background:rgba(0,0,0,0.85);border:2px solid #ff6b35;border-radius:16px;padding:20px;max-width:300px;text-align:center;color:#fff;animation:popIn 0.3s">
<div id="tutIcon" style="font-size:2.5em;margin-bottom:5px"></div>
<div id="tutTitle" style="font-size:1.1em;font-weight:700;color:#ff6b35"></div>
<div id="tutText" style="font-size:0.9em;margin:10px 0;line-height:1.5"></div>
<button class="btn btn-primary btn-small" onclick="nextTutorial()" id="tutBtn">NEXT</button>
</div>
</div>

<div id="worldMapS" class="overlay">
<div style="font-size:1.5em;font-weight:800;color:#fff;margin-bottom:5px">&#x1F5FA; WORLD MAP</div>
<div id="mapCoins" class="hud-coin" style="margin-bottom:10px"></div>
<div id="roomGrid" style="display:flex;flex-wrap:wrap;justify-content:center;max-width:480px"></div>
<button class="btn btn-secondary btn-small" onclick="showMenu()" style="margin-top:15px">&#x2190; BACK</button>
</div>

<div id="roomIntroS" class="overlay">
<div id="riIcon" style="font-size:3em"></div>
<div id="riName" style="font-size:1.5em;font-weight:800;color:#fff;margin:5px 0"></div>
<div id="riDesc" style="color:#aaa;font-size:0.85em;margin-bottom:10px"></div>
<div id="riDots" class="level-dots"></div>
<button class="btn btn-secondary btn-small" onclick="startWorldMap()" style="margin-top:10px">&#x2190; MAP</button>
</div>

<div id="hud" class="hud" style="display:none">
<div><div class="hud-item">LVL <span id="hudLevel">1</span></div><div class="hud-room" id="hudRoom">Glass Lab</div></div>
<div class="hud-item hud-coin" id="hudCoins"></div>
<div style="text-align:center"><div class="hud-item" id="hudTargets"></div></div>
<div style="text-align:right"><div class="hud-item">SHOTS: <span id="hudShots">3</span></div><div class="hud-item" style="font-size:0.75em;color:#f7c948" id="hudScore">0</div></div>
</div>

<div id="levelCompleteS" class="overlay">
<div style="font-size:2.5em;margin-bottom:5px" id="lcEmoji"></div>
<div style="font-size:1.5em;font-weight:800;color:#4CAF50" id="lcTitle">LEVEL COMPLETE!</div>
<div class="stars" id="lcStars"></div>
<div style="color:#f7c948;font-size:1.3em;font-weight:700" id="lcScore">+100</div>
<div id="lcCoins" style="color:#f7c948;font-size:1em;margin:5px 0"></div>
<div id="lcPerfect" style="color:#ff6b35;font-size:1.2em;font-weight:800;display:none"></div>
<button class="btn btn-primary" onclick="nextLevel()">NEXT &#x2192;</button>
<button class="btn btn-secondary btn-small" onclick="shareScore()">&#x1F4E4; SHARE</button>
</div>

<div id="bossClearS" class="overlay">
<div style="font-size:3em">&#x1F3C6;</div>
<div style="font-size:1.8em;font-weight:900;color:#f7c948;margin:10px 0">BOSS DEFEATED!</div>
<div id="bcRoom" style="color:#aaa;font-size:0.9em"></div>
<div id="bcUnlock" style="color:#4CAF50;font-size:1em;font-weight:700;margin:10px 0"></div>
<div id="bcCoins" style="color:#f7c948;font-size:1.1em;margin:5px 0"></div>
<button class="btn btn-gold" onclick="nextLevel()">CONTINUE &#x2192;</button>
</div>

<div id="gameOverS" class="overlay">
<div id="goEmoji" style="font-size:2.5em"></div>
<div id="goTitle" style="font-size:1.5em;font-weight:800;color:#ff1744;margin:5px 0">SO CLOSE!</div>
<div id="goSubtitle" style="color:#aaa;font-size:0.9em;margin-bottom:10px"></div>
<div id="goTargetLeft" style="color:#ff6b35;font-size:1.1em;font-weight:700;margin-bottom:10px"></div>
<button class="btn btn-gold btn-small" onclick="watchAdExtraShot()" style="margin-bottom:5px">&#x1F3AC; WATCH AD = +1 SHOT</button>
<button class="btn btn-primary" id="rageBtn" onclick="activateRageModeFromGameOver()" style="display:none;background:linear-gradient(135deg,#ff1744,#d50000);margin-bottom:5px">&#x1F525; RAGE MODE</button>
  <button class="btn btn-primary" onclick="retryLevel()" style="animation:shake 0.5s infinite">&#x1F504; RETRY</button>
<button class="btn btn-secondary btn-small" onclick="startWorldMap()">&#x2190; MAP</button>
</div>

<div id="shopS" class="overlay">
<div style="font-size:1.5em;font-weight:800;color:#fff;margin-bottom:3px">&#x1F6D2; SHOP</div>
<div id="shopCoins" class="hud-coin" style="margin-bottom:8px"></div>
<div class="tab-bar" id="shopTabs">
<button class="tab-btn active" onclick="shopTab('skins')">BALLS</button>
<button class="tab-btn" onclick="shopTab('trails')">TRAILS</button>
<button class="tab-btn" onclick="shopTab('effects')">EFFECTS</button>
<button class="tab-btn" onclick="shopTab('vip')">⭐ VIP</button>
</div>
<div id="shopGrid" class="shop-grid"></div>
<button class="btn btn-secondary btn-small" onclick="closeShop()" style="margin-top:10px">&#x2190; BACK</button>
</div>

<div id="achieveS" class="overlay">
<div style="font-size:1.5em;font-weight:800;color:#fff;margin-bottom:8px">&#x1F3C6; ACHIEVEMENTS</div>
<div id="achieveList" class="achievement-list"></div>
<button class="btn btn-secondary btn-small" onclick="closeAchievements()" style="margin-top:10px">&#x2190; BACK</button>
</div>

<div id="leaderboardS" class="overlay">
<div style="font-size:1.5em;font-weight:800;color:#fff;margin-bottom:8px">&#x1F4CA; LEADERBOARD</div>
<div id="lbList" class="leaderboard-list"></div>
<button class="btn btn-secondary btn-small" onclick="closeLeaderboard()" style="margin-top:10px">&#x2190; BACK</button>
</div>

<div id="dailySpinS" class="overlay">
<div style="font-size:1.5em;font-weight:800;color:#f7c948;margin-bottom:5px">&#x1F3B0; DAILY SPIN</div>
<div id="spinStatus" style="color:#aaa;font-size:0.8em;margin-bottom:10px"></div>
<div class="spin-pointer"></div>
<div class="spin-wheel" id="spinWheel"></div>
<div id="spinResult" style="color:#f7c948;font-size:1.2em;font-weight:700;margin:10px 0;display:none"></div>
<button class="btn btn-gold" id="spinBtn" onclick="doSpin()">SPIN!</button>
<button class="btn btn-secondary btn-small" onclick="closeDailySpin()" style="margin-top:8px">&#x2190; BACK</button>
</div>

<div id="statsS" class="overlay">
<div style="font-size:1.5em;font-weight:800;color:#fff;margin-bottom:8px">&#x1F4C8; STATS</div>
<div id="statsContent" style="color:#aaa;font-size:0.85em;max-width:320px;text-align:left;line-height:1.8"></div>
<button class="btn btn-gold btn-small" onclick="watchAdExtraShot()" id="adExtraShotBtn" style="margin-bottom:8px;display:none">&#x1F3AC; Watch Ad for +1 Shot</button>
      <button class="btn btn-secondary btn-small" onclick="showMenu()" style="margin-top:10px">&#x2190; BACK</button>
</div>
<div class="rage-bar" id="rageBar"><div class="rage-fill" id="rageFill"></div></div>
<div class="rage-label" id="rageLabel">RAGE: 0%</div>
<div id="rageModeOverlay"></div>
<div class="fomo" id="fomo"></div>

<script>

// v6.2 BOOM CHAIN
var COIN=String.fromCodePoint(0x1FA99),FIRE=String.fromCodePoint(0x1F525),STAR='\u2B50',STAR_E='\u2606',
PARTY=String.fromCodePoint(0x1F389),BOOM=String.fromCodePoint(0x1F4A5),LOCK=String.fromCodePoint(0x1F512),
UNLOCK=String.fromCodePoint(0x1F513),SPARKLE=String.fromCodePoint(0x1F31F),
CRY=String.fromCodePoint(0x1F629),ANGRY=String.fromCodePoint(0x1F624),SAD=String.fromCodePoint(0x1F614),
RAGE=String.fromCodePoint(0x1F4A2),CHECK='\u2705',TIMER='\u23F3',GLOBE=String.fromCodePoint(0x1F310),
BOMB=String.fromCodePoint(0x1F4A3),GEM=String.fromCodePoint(0x1F48E),SHIELD=String.fromCodePoint(0x1F6E1),

var musicPlaying=false,musicNodes=[];
function startMusic(){
      if(musicPlaying)return;musicPlaying=true;
      try{
              var a=getAudio();
              // Chord progression: Cmaj7 -> Am7 -> Fmaj7 -> G7
              var chords=[[261.63,329.63,392,493.88],[220,261.63,329.63,415.3],[174.61,220,261.63,329.63],[196,246.94,293.66,369.99]];
              var chordIdx=0;
              var masterGain=a.createGain();masterGain.gain.value=0.035;masterGain.connect(a.destination);
              var padOscs=[];
              function setChord(idx){
                        padOscs.forEach(function(o){try{o.stop();}catch(e){}});
                        padOscs=[];
                        chords[idx].forEach(function(freq){
                                    var osc=a.createOscillator();osc.type='sine';osc.frequency.value=freq;
                                    var g=a.createGain();g.gain.value=0.2;
                                    osc.connect(g);g.connect(masterGain);
                                    osc.start();padOscs.push(osc);musicNodes.push(osc);
                        });
              }
              setChord(0);
              // Change chord every 4 seconds
              var chordInterval=setInterval(function(){
                        if(!musicPlaying){clearInterval(chordInterval);return;}
                        chordIdx=(chordIdx+1)%4;
                        setChord(chordIdx);
              },4000);
              window._chordInterval=chordInterval;
              // Melody line
              var melody=[523.25,587.33,659.25,587.33,523.25,493.88,440,493.88,523.25,659.25,587.33,523.25,493.88,440,392,440];
              var melIdx=0;
              var melInterval=setInterval(function(){
                        if(!musicPlaying){clearInterval(melInterval);return;}
                        var o=a.createOscillator();o.type='triangle';o.frequency.value=melody[melIdx%melody.length];
                        var g=a.createGain();g.gain.setValueAtTime(0.06,a.currentTime);
                        g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+1.5);
                        o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+1.5);
                        melIdx++;
              },750);
              window._melInterval=melInterval;
              window._arpInterval=chordInterval;
      }catch(e){}
}
function stopMusic(){
  musicPlaying=false;
  musicNodes.forEach(function(n){try{n.stop();}catch(e){}});
  musicNodes=[];
      if(window._arpInterval)clearInterval(window._arpInterval);if(window._chordInterval)clearInterval(window._chordInterval);if(window._melInterval)clearInterval(window._melInterval);
}

var analyticsKey='rl_analytics';
function logEvent(name,data){
  try{
    var log=JSON.parse(localStorage.getItem(analyticsKey)||'[]');
    log.push({e:name,d:data,t:Date.now()});
    if(log.length>500)log=log.slice(-300);
    localStorage.setItem(analyticsKey,JSON.stringify(log));
  }catch(e){}
}
function getAnalytics(){
  try{return JSON.parse(localStorage.getItem(analyticsKey)||'[]');}catch(e){return[];}
}
function getAnalyticsSummary(){
  var log=getAnalytics();
  var summary={sessions:0,levelsPlayed:0,levelsWon:0,levelsLost:0,avgRetries:0,
  dropOffLevels:{},totalPlayTime:0,perfectShots:0,coinsEarned:0,shopVisits:0};
  var retries={};
  log.forEach(function(e){
    if(e.e==='session_start')summary.sessions++;
    if(e.e==='level_start'){summary.levelsPlayed++;var k='L'+e.d.level;retries[k]=(retries[k]||0)+1;}
    if(e.e==='level_complete')summary.levelsWon++;
    if(e.e==='level_fail'){summary.levelsLost++;var k2='L'+e.d.level;summary.dropOffLevels[k2]=(summary.dropOffLevels[k2]||0)+1;}
    if(e.e==='perfect_shot')summary.perfectShots++;
    if(e.e==='coins_earned')summary.coinsEarned+=(e.d.amount||0);
    if(e.e==='shop_visit')summary.shopVisits++;
  });
  var retryVals=Object.values(retries);
  summary.avgRetries=retryVals.length>0?retryVals.reduce(function(a,b){return a+b},0)/retryVals.length:0;
  return summary;
}

// Near miss detection
function checkNearMiss(){
  if(targetsLeft<=0)return;
  var closest=Infinity;var closestT=null;
  targets.forEach(function(t){if(!t.alive)return;
    balls.forEach(function(b){if(b.active)return;
      var last=b.trail&&b.trail.length>0?b.trail[b.trail.length-1]:b;
      var dx=last.x-t.x,dy=last.y-t.y,dist=Math.sqrt(dx*dx+dy*dy)-t.r-8;
      if(dist<closest&&dist>0){closest=dist;closestT=t;}
    });
  });
  if(closest<30&&closestT){
    nearMissDistance=Math.round(closest);
    var el=document.createElement('div');el.className='near-miss';
    el.textContent='MISSED BY '+nearMissDistance+'px!';
    el.style.left=(closestT.x-80)+'px';el.style.top=(closestT.y-40)+'px';
    document.body.appendChild(el);setTimeout(function(){el.remove()},1500);
    hapticHeavy();playTone(200,'sawtooth',0.2,0.15);
  }
}

    targets.push({x:tx,y:ty,r:type==='hard'?10:14,type:type,hp:type==='hard'?2:1,maxHp:type==='hard'?2:1,alive:true,pulse:0,angle:Math.random()*Math.PI*2,speed:type==='moving'?(2+gl*0.15):0,moveDir:Math.random()>0.5?1:-1,ghostTimer:0,ghostVisible:true,bh_pull:type==='blackhole'?(60+gl*2):0});

function openRoomIntro(ri){
  currentRoom=ri;var room=ROOMS[ri];var rp=save.roomProgress[ri];

  document.getElementById('riName').textContent=room.name;
  document.getElementById('riName').style.color=room.accent;
  document.getElementById('riDesc').textContent=room.desc;
  var dots=document.getElementById('riDots');dots.innerHTML='';
  if(ri===5){
    var endlessLevel=save.endlessHighLevel?save.endlessHighLevel-25:1;
    var startDot=document.createElement('div');startDot.className='level-dot current';
    startDot.textContent='\u221E';
    startDot.style.borderColor=room.accent;startDot.style.fontSize='1.2em';
    startDot.onclick=function(){startRoomLevel(ri,0)};
    dots.appendChild(startDot);
    var info=document.createElement('div');info.style.cssText='color:#ffd54f;font-size:0.85em;margin-top:8px;font-weight:700;';

  } else {
  for(var i=0;i<5;i++){
    var dot=document.createElement('div');dot.className='level-dot';
    var ib=(i===4);var sc=rp.levels[i];
    if(sc>0)dot.classList.add('completed');

function generateLevel(room,li,gl){
  balls=[];targets=[];walls=[];particles=[];shockwaves=[];textPops=[];confetti=[];trailParticles=[];
  screenShake=0;slowMo=1;slowMoTimer=0;
  var margin=50,topMargin=80,playW=W-margin*2,playH=H-topMargin-margin;
  launchX=W/2;launchY=H-60;
  // Check for handcrafted level
  var hcKey=currentRoom+'_'+li;
  var hc=HANDCRAFTED[hcKey];
  if(hc){
    shotsLeft=totalShots=hc.shots;
    hc.targets.forEach(function(ht){
      var tx=margin+ht.x*playW,ty=topMargin+ht.y*playH;
      var type=ht.type;
      targets.push({x:tx,y:ty,r:type==='boss'?30:(type==='hard'?10:14),type:type,
      hp:type==='boss'?5:(type==='hard'?2:1),maxHp:type==='boss'?5:(type==='hard'?2:1),
      alive:true,pulse:0,angle:Math.random()*Math.PI*2,
      speed:type==='moving'?(1+gl*0.1):0,moveDir:Math.random()>0.5?1:-1,
      ghostTimer:0,ghostVisible:true,bh_pull:type==='blackhole'?(50+gl*2):0});
    });
    (hc.walls||[]).forEach(function(hw){
      walls.push({x:margin+hw.x*playW,y:topMargin+hw.y*playH,w:hw.w*playW,h:Math.max(hw.h*playH,8)});
    });
  }else{
    // Procedural generation
    if(isBossRoom){shotsLeft=totalShots=3;}else if(currentRoom===5){totalShots=Math.max(2,5-Math.floor(Math.min(li,8)/2));shotsLeft=totalShots;}else{totalShots=Math.max(2,5-Math.floor(li/2));shotsLeft=totalShots;}
    var numT=isBossRoom?1:Math.min(3+li+Math.floor(gl/3),15);
    var types=room.targetTypes;
    for(var i=0;i<numT;i++){
      var tx=margin+Math.random()*playW,ty=topMargin+30+Math.random()*(playH*0.55);
      var type=types[Math.floor(Math.random()*types.length)];
      if(isBossRoom)type='boss';
      targets.push({x:tx,y:ty,r:isBossRoom?30:(type==='hard'?10:14),type:type,
      hp:isBossRoom?5:(type==='hard'?2:1),maxHp:isBossRoom?5:(type==='hard'?2:1),
      alive:true,pulse:0,angle:Math.random()*Math.PI*2,
      speed:type==='moving'?(1+gl*0.1):0,moveDir:Math.random()>0.5?1:-1,
      ghostTimer:0,ghostVisible:true,bh_pull:type==='blackhole'?(50+gl*2):0});
    }
    var numW=Math.min(Math.floor(gl/3),6);
    for(var i=0;i<numW;i++){
      var wx=margin+Math.random()*playW,wy=topMargin+Math.random()*(playH*0.8);
      var ww=40+Math.random()*80,wh=8;if(Math.random()>0.5){var tmp=ww;ww=wh;wh=tmp;}
      walls.push({x:wx,y:wy,w:ww,h:wh});
    }
  }
  targetsLeft=targets.filter(function(t){return t.alive}).length;
}

function shoot(dx,dy){
  if(!gameActive||shooting||shotsLeft<=0)return;
  var dist=Math.sqrt(dx*dx+dy*dy);if(dist<10)return;
  shooting=true;if(!rageModeActive)shotsLeft--;else rageModeShots++;save.totalShots=(save.totalShots||0)+1;
  var speed=10,vx=(dx/dist)*speed,vy=(dy/dist)*speed;
  balls.push({x:launchX,y:launchY,vx:vx,vy:vy,r:8,active:true,bounces:0,trail:[]});
  sndShoot();updateHUD();
}

function showComboText(n){var texts=['','DOUBLE!','TRIPLE!','QUAD!','PENTA!','INSANE!','GODLIKE!','UNSTOPPABLE!'];var colors=['','#4CAF50','#2196F3','#9c27b0','#ff6b35','#f7c948','#e91e63','#ff1744'];var idx=Math.min(n,texts.length-1);if(idx<2)return;var el=document.createElement('div');el.className='combo-text';el.textContent=texts[idx];el.style.color=colors[idx];el.style.left=(W/2-80)+'px';el.style.top=(H/2-50+Math.random()*40)+'px';el.style.fontSize=(2+idx*0.3)+'em';document.body.appendChild(el);setTimeout(function(){el.remove()},1000);sndCombo(idx);hapticCombo(idx);}

function triggerShake(intensity){screenShake=Math.max(screenShake,intensity);}
function triggerSlowMo(duration){slowMo=0.3;slowMoTimer=duration;}

function update(){
  updateRageMode();
  if(slowMoTimer>0){slowMoTimer-=16;if(slowMoTimer<=0){slowMo=1;slowMoTimer=0;}}
  if(screenShake>0)screenShake*=0.9;if(screenShake<0.5)screenShake=0;
  targets.forEach(function(t){if(!t.alive)return;
    if(t.type==='moving'){t.x+=t.speed*t.moveDir*slowMo;if(t.x<50||t.x>W-50)t.moveDir*=-1;}
    if(t.type==='ghost'){t.ghostTimer+=16*slowMo;t.ghostVisible=Math.sin(t.ghostTimer*0.003)>-0.3;}
    t.pulse=Math.max(0,(t.pulse||0)-0.02);
  });
  var allBallsDone=true;
  balls.forEach(function(b){if(!b.active)return;allBallsDone=false;
    b.trail.push({x:b.x,y:b.y,life:1});if(b.trail.length>20)b.trail.shift();
    b.trail.forEach(function(tp){tp.life-=0.05});spawnTrailParticle(b.x,b.y);
    if(currentRoom>=1){targets.forEach(function(t){if(t.type==='blackhole'&&t.alive){
      var dx=t.x-b.x,dy=t.y-b.y,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<t.bh_pull&&dist>5){var force=2/dist;b.vx+=(dx/dist)*force;b.vy+=(dy/dist)*force;}}});}
    b.x+=b.vx*slowMo;b.y+=b.vy*slowMo;b.vy+=0.04*slowMo;
    if(b.x<b.r){b.x=b.r;b.vx=Math.abs(b.vx);b.bounces++;sndBounce();triggerShake(2);}
    if(b.x>W-b.r){b.x=W-b.r;b.vx=-Math.abs(b.vx);b.bounces++;sndBounce();triggerShake(2);}
    if(b.y<b.r){b.y=b.r;b.vy=Math.abs(b.vy);b.bounces++;sndBounce();triggerShake(2);}
    if(b.y>H+50){b.active=false;return;}
    walls.forEach(function(w){if(b.x+b.r>w.x&&b.x-b.r<w.x+w.w&&b.y+b.r>w.y&&b.y-b.r<w.y+w.h){
      var oL=(b.x+b.r)-w.x,oR=(w.x+w.w)-(b.x-b.r),oT=(b.y+b.r)-w.y,oB=(w.y+w.h)-(b.y-b.r);
      var m=Math.min(oL,oR,oT,oB);if(m===oL||m===oR)b.vx*=-1;else b.vy*=-1;
      b.bounces++;sndBounce();triggerShake(2);spawnParticles(b.x,b.y,'#888',3,2,2);}});
    targets.forEach(function(t){if(!t.alive)return;if(t.type==='ghost'&&!t.ghostVisible)return;
      var dx=b.x-t.x,dy=b.y-t.y,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<b.r+t.r){t.hp--;t.pulse=1;triggerShake(t.type==='boss'?8:4);
        if(t.hp<=0){t.alive=false;targetsLeft--;combo++;if(combo>maxCombo)maxCombo=combo;
          var pts=t.type==='boss'?500:(t.type==='hard'?30:(t.type==='crystal'?40:20));
          pts=pts*Math.max(1,combo);score+=pts;showScoreFly(t.x,t.y-20,pts);
          var coinAmt=Math.floor(pts/20)+(combo>2?combo:0);coins+=coinAmt;showCoinFly(t.x+20,t.y,coinAmt);
          var ec=t.type==='explosive'?'#ff5722':(t.type==='crystal'?'#81d4fa':ROOMS[currentRoom].accent);
          spawnParticles(t.x,t.y,ec,20+combo*5,6,5);spawnShockwave(t.x,t.y,ec);
          if(t.type==='explosive'){sndExplode();triggerShake(10);
            targets.forEach(function(t2){if(t2.alive&&t2!==t){var d2=Math.sqrt(Math.pow(t2.x-t.x,2)+Math.pow(t2.y-t.y,2));
            if(d2<100){t2.hp-=2;if(t2.hp<=0){t2.alive=false;targetsLeft--;combo++;if(combo>maxCombo)maxCombo=combo;
            var p2=20*combo;score+=p2;showScoreFly(t2.x,t2.y-20,p2);spawnParticles(t2.x,t2.y,'#ff5522',15,5,4);spawnShockwave(t2.x,t2.y,'#ff5522');}}}});
            spawnParticles(t.x,t.y,'#ff5722',40,10,8);
          }else if(t.type==='crystal'){sndShatter();
            for(var s=0;s<12;s++){var angle=Math.random()*Math.PI*2,spd=Math.random()*6+2;
            particles.push({x:t.x,y:t.y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,r:Math.random()*5+2,color:'rgba(200,230,255,0.8)',life:1,decay:0.01,gravity:0.1,isShard:true,rotation:Math.random()*360,rotSpeed:Math.random()*10});}
          }else if(t.type==='boss'){sndBoss();triggerShake(15);triggerSlowMo(1500);spawnConfetti(t.x,t.y,60);spawnParticles(t.x,t.y,'#f7c948',50,10,8);
          }else{sndHit();}
          showComboText(combo);checkChainRecord(combo);if(combo>=3)triggerSlowMo(400);
        }else{sndHit();spawnParticles(t.x,t.y,'#fff',5,3,2);b.vx=(dx/dist)*7;b.vy=(dy/dist)*7;
  if(t.type==='boss'&&t.hp>0&&Math.random()<0.4)showBossTaunt();}}});
  });
  trailParticles.forEach(function(tp){tp.life-=tp.decay});trailParticles=trailParticles.filter(function(tp){return tp.life>0});
  particles.forEach(function(p){p.x+=p.vx*slowMo;p.y+=p.vy*slowMo;p.vy+=(p.gravity||0)*slowMo;p.life-=p.decay*slowMo;if(p.isShard)p.rotation+=(p.rotSpeed||0);});
  particles=particles.filter(function(p){return p.life>0});
  shockwaves.forEach(function(s){s.r+=3*slowMo;s.life-=0.03*slowMo;});shockwaves=shockwaves.filter(function(s){return s.life>0});

  for(var y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  bgParticles.forEach(function(p){p.y-=p.speed;p.x+=p.drift;if(p.y<-5){p.y=H+5;p.x=Math.random()*W;}
  ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.globalAlpha=p.opacity;ctx.fillStyle=room.accent;ctx.fill();ctx.globalAlpha=1;});

// ===== OBSTACLE SYSTEM: WALLS & BUMPERS =====
const OBSTACLES={
  wall:{name:'Wall',color:'#555',width:80,height:12,bounce:0.3},
  bumper:{name:'Bumper',color:'#ff6b35',radius:15,bounce:1.5},
  magnet:{name:'Magnet',color:'#8b5cf6',radius:30,force:0.3}
};

function generateObstacles(level,roomIdx){
  const obs=[];
  if(level<2||roomIdx===0)return obs;
  const count=Math.min(Math.floor(level/2),4);
      // W and H are global variables
  for(let i=0;i<count;i++){
    const type=roomIdx>=3&&Math.random()>0.5?'bumper':(roomIdx>=4&&Math.random()>0.7?'magnet':'wall');
    obs.push({
      type:type,
      x:W*0.2+Math.random()*W*0.6,
      y:H*0.2+Math.random()*H*0.5,
      angle:Math.random()*Math.PI,
      ...OBSTACLES[type]
    });
  }
  return obs;
}

let currentObstacles=[];
const _origGenerateLevel=generateLevel;
generateLevel=function(roomIdx,levelIdx,isBoss){
  _origGenerateLevel(roomIdx,levelIdx,isBoss);
  currentObstacles=generateObstacles(levelIdx,roomIdx);
};

// Draw obstacles in game loop
const _origGameLoop=typeof gameLoop==='function'?gameLoop:null;
function drawObstacles(){
  if(!currentObstacles.length)return;
  const c=C.getContext('2d');
  currentObstacles.forEach(o=>{
    c.save();
    if(o.type==='wall'){
      c.translate(o.x,o.y);
      c.rotate(o.angle);
      c.fillStyle=o.color;
      c.shadowColor=o.color;
      c.shadowBlur=8;
      c.fillRect(-o.width/2,-o.height/2,o.width,o.height);
    }else if(o.type==='bumper'){
      c.beginPath();
      c.arc(o.x,o.y,o.radius,0,Math.PI*2);
      c.fillStyle=o.color;
      c.shadowColor=o.color;
      c.shadowBlur=12;
      c.fill();
      c.strokeStyle='#fff';
      c.lineWidth=2;
      c.stroke();
    }else if(o.type==='magnet'){
      c.beginPath();
      c.arc(o.x,o.y,o.radius,0,Math.PI*2);
      c.fillStyle=o.color+'33';
      c.fill();
      c.strokeStyle=o.color;
      c.lineWidth=2;
      c.setLineDash([4,4]);
      c.stroke();
      c.setLineDash([]);
      c.fillStyle=o.color;
      c.font='16px Arial';
      c.textAlign='center';
      c.fillText('M',o.x,o.y+5);
    }
    c.restore();
  });
}
